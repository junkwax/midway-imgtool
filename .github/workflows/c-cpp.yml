name: C/C++ CI

on:
  push:
    branches: ["SDL-main"]
    tags:     ["v*"]
  pull_request:
    branches: ["SDL-main"]

# Required for softprops/action-gh-release to create/update Releases on a
# tagged push. The default GITHUB_TOKEN has read-only contents permission;
# release uploads need write.
permissions:
  contents: write

# A tag push (refs/tags/v*) becomes a Release with all four artifacts attached
# (Windows x64 zip, Windows x86 zip, Linux x64 tar.gz, macOS DMG). The Release
# body is extracted from the matching CHANGELOG.md section. Branch pushes build
# the same artifacts but only upload them as workflow CI artifacts.
#
# To cut a release:
#   git tag -a v2.1.0 -m "..." && git push origin v2.1.0

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, Win32]
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-2.30.2/SDL2-devel-2.30.2-VC.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\sdl2.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\sdl2.zip" -DestinationPath "$env:RUNNER_TEMP\SDL2" -Force
          echo "SDL2_DIR=$env:RUNNER_TEMP\SDL2\SDL2-2.30.2\cmake" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DSDL2_DIR="$env:SDL2_DIR"

      - name: Build
        run: cmake --build build --config Release

      # SDL2.dll must be placed next to the exe at runtime.
      # CMake links the .lib but does not copy the DLL automatically.
      - name: Copy SDL2 DLL
        shell: pwsh
        run: |
          $sdl2_base = "$env:RUNNER_TEMP\SDL2\SDL2-2.30.2"
          $dll_arch  = if ("${{ matrix.arch }}" -eq "Win32") { "x86" } else { "x64" }
          Copy-Item "$sdl2_base\lib\$dll_arch\SDL2.dll" "build\Release\SDL2.dll"

      # Stage the build into a clean dist/ tree, then zip it. Both the CI
      # artifact and the release upload pull from the same zip.
      - name: Stage dist tree
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $tag  = if ("${{ matrix.arch }}" -eq "Win32") { "x86" } else { "x64" }
          $dist = "dist/imgtool-windows-$tag"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "build/Release/imgtool.exe" $dist
          Copy-Item "build/Release/SDL2.dll"   $dist
          Copy-Item "build/Release/it.hlp"     $dist -ErrorAction SilentlyContinue
          Copy-Item "README.md"                $dist -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md"             $dist -ErrorAction SilentlyContinue
          if (Test-Path "build/Release/assets") {
            Copy-Item -Recurse "build/Release/assets" $dist
          }
          Compress-Archive -Path "$dist/*" -DestinationPath "dist/imgtool-windows-$tag.zip"
          echo "ZIP_PATH=dist/imgtool-windows-$tag.zip" >> $env:GITHUB_ENV
          echo "ZIP_NAME=imgtool-windows-$tag" >> $env:GITHUB_ENV

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $header = "^## \[$([regex]::Escape($tag))\](?:\s|$)"
          $lines = Get-Content "CHANGELOG.md"
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $header) {
              $start = $i
              break
            }
          }
          if ($start -lt 0) {
            "Release notes for $tag were not found in CHANGELOG.md." | Set-Content "RELEASE_NOTES.md" -Encoding utf8
            exit 0
          }
          $body = New-Object System.Collections.Generic.List[string]
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[") { break }
            $body.Add($lines[$i])
          }
          while ($body.Count -gt 0 -and [string]::IsNullOrWhiteSpace($body[0])) {
            $body.RemoveAt(0)
          }
          $body | Set-Content "RELEASE_NOTES.md" -Encoding utf8

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ZIP_PATH }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Stage dist tree
        run: |
          DIST="dist/imgtool-linux-x64"
          mkdir -p "$DIST"
          cp build/imgtool "$DIST/"
          [ -f README.md ] && cp README.md "$DIST/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "$DIST/"
          if [ -d "build/assets" ]; then cp -R build/assets "$DIST/"; fi
          tar -C dist -czvf "dist/imgtool-linux-x64.tar.gz" "imgtool-linux-x64"
          echo "TAR_PATH=dist/imgtool-linux-x64.tar.gz" >> $GITHUB_ENV

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgtool-linux-x64
          path: ${{ env.TAR_PATH }}

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $header = "^## \[$([regex]::Escape($tag))\](?:\s|$)"
          $lines = Get-Content "CHANGELOG.md"
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $header) {
              $start = $i
              break
            }
          }
          if ($start -lt 0) {
            "Release notes for $tag were not found in CHANGELOG.md." | Set-Content "RELEASE_NOTES.md" -Encoding utf8
            exit 0
          }
          $body = New-Object System.Collections.Generic.List[string]
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[") { break }
            $body.Add($lines[$i])
          }
          while ($body.Count -gt 0 -and [string]::IsNullOrWhiteSpace($body[0])) {
            $body.RemoveAt(0)
          }
          $body | Set-Content "RELEASE_NOTES.md" -Encoding utf8

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.TAR_PATH }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure CMake
        run: cmake -B build -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build build

      - name: Resolve version string
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create app bundle
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APP="build/ImgTool.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Frameworks"
          mkdir -p "$APP/Contents/Resources/assets"

          # Copy binary
          cp build/imgtool "$APP/Contents/MacOS/imgtool"

          # Copy SDL2 dylib and fix install name
          SDL2_DYLIB=$(otool -L build/imgtool | grep libSDL2 | awk '{print $1}')
          cp "$SDL2_DYLIB" "$APP/Contents/Frameworks/"
          SDL2_NAME=$(basename "$SDL2_DYLIB")
          install_name_tool -change "$SDL2_DYLIB" "@executable_path/../Frameworks/$SDL2_NAME" "$APP/Contents/MacOS/imgtool"
          install_name_tool -id "@executable_path/../Frameworks/$SDL2_NAME" "$APP/Contents/Frameworks/$SDL2_NAME"

          # Copy assets (icon font)
          if [ -d "build/assets" ]; then
            cp -R build/assets/* "$APP/Contents/Resources/assets/"
          fi
          if [ -d "platform/assets" ]; then
            cp platform/assets/* "$APP/Contents/Resources/assets/"
          fi

          # Create Info.plist with the resolved version (heredoc with envsubst-
          # style ${VAR} expansion via cat — we set VERSION on the shell first).
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>imgtool</string>
              <key>CFBundleIdentifier</key>
              <string>com.imgtool.midway</string>
              <key>CFBundleName</key>
              <string>ImgTool</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${APP_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${APP_VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          DMG_DIR="build/dmg"
          mkdir -p "$DMG_DIR"
          cp -R "build/ImgTool.app" "$DMG_DIR/"
          [ -f README.md ] && cp README.md "$DMG_DIR/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "ImgTool" -srcfolder "$DMG_DIR" -ov -format UDZO "build/ImgTool.dmg"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgtool-macos
          path: build/ImgTool.dmg

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $header = "^## \[$([regex]::Escape($tag))\](?:\s|$)"
          $lines = Get-Content "CHANGELOG.md"
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $header) {
              $start = $i
              break
            }
          }
          if ($start -lt 0) {
            "Release notes for $tag were not found in CHANGELOG.md." | Set-Content "RELEASE_NOTES.md" -Encoding utf8
            exit 0
          }
          $body = New-Object System.Collections.Generic.List[string]
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[") { break }
            $body.Add($lines[$i])
          }
          while ($body.Count -gt 0 -and [string]::IsNullOrWhiteSpace($body[0])) {
            $body.RemoveAt(0)
          }
          $body | Set-Content "RELEASE_NOTES.md" -Encoding utf8

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/ImgTool.dmg
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
